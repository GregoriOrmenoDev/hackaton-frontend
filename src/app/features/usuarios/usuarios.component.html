<h2>Usuarios</h2>

<p *ngIf="mensaje" style="color:green;">{{ mensaje }}</p>
<p *ngIf="loading">Cargando...</p>

<button (click)="nuevo()" style="margin-bottom:10px;">+ Nuevo Usuario</button>

<!-- Formulario -->
<div *ngIf="showForm" style="border:1px solid #333; padding:16px; margin-bottom:16px; max-width:400px;">
  <h3>{{ editando ? 'Editar' : 'Nuevo' }} Usuario</h3>

  <div style="margin-bottom:8px;">
    <label>Nombre completo *</label><br>
    <input type="text" [(ngModel)]="form.nombre" style="width:100%;" />
  </div>
  <div style="margin-bottom:8px;">
    <label>Usuario (login) *</label><br>
    <input type="text" [(ngModel)]="form.usuario" style="width:100%;" />
  </div>
  <div style="margin-bottom:8px;">
    <label>Contraseña *</label><br>
    <input type="password" [(ngModel)]="form.password" style="width:100%;" />
  </div>
  <div style="margin-bottom:8px;">
    <label>Rol *</label><br>
    <select [(ngModel)]="form.rol" style="width:100%;">
      <option value="ADMIN">ADMIN</option>
      <option value="VENDEDOR">VENDEDOR</option>
    </select>
  </div>

  <div style="display:flex; gap:8px; margin-top:12px;">
    <button (click)="guardar()">Guardar</button>
    <button (click)="cancelar()">Cancelar</button>
  </div>
</div>

<!-- Tabla -->
<table border="1" cellpadding="6" cellspacing="0" style="width:100%; border-collapse:collapse;">
  <thead style="background:#eee;">
    <tr>
      <th>ID</th><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Estado</th><th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let u of usuarios">
      <td>{{ u.idUsuario }}</td>
      <td>{{ u.nombre }}</td>
      <td>{{ u.usuario }}</td>
      <td>{{ u.rol }}</td>
      <td>{{ u.estado ? 'Activo' : 'Inactivo' }}</td>
      <td>
        <button (click)="editar(u)">Editar</button>
        <button (click)="eliminar(u)" style="margin-left:4px;">Eliminar</button>
      </td>
    </tr>
    <tr *ngIf="usuarios.length === 0 && !loading">
      <td colspan="6" style="text-align:center;">No hay usuarios</td>
    </tr>
  </tbody>
</table>
