server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy hacia el backend Spring Boot
    # ${BACKEND_URL} se reemplaza en tiempo de ejecucion por envsubst
    # Ej: http://techstore-backend:8080  (por nombre de contenedor en la misma red)
    #     http://IP_EC2_BACKEND:8080     (en produccion en AWS)
    location /api/ {
        proxy_pass         ${BACKEND_URL}/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Todas las rutas van al index.html para que Angular maneje el routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estaticos (JS, CSS, imagenes, fuentes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sin cache para index.html (siempre debe ser el mas reciente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
