<h2>Matrículas</h2>

<p *ngIf="mensaje" style="color:green;">{{ mensaje }}</p>
<p *ngIf="loadingVentas">Cargando...</p>

<div style="margin-bottom:10px;">
  <button (click)="nuevaMatricula()">+ Nueva Matrícula</button>
</div>

<!-- Formulario nueva matrícula -->
<div *ngIf="showFormVenta" style="border:1px solid #333; padding:16px; margin-bottom:16px; max-width:500px;">
  <h3>Registrar Matrícula</h3>

  <div style="margin-bottom:8px;">
    <label>Estudiante *</label><br>
    <select [(ngModel)]="form.studentId" style="width:100%;">
      <option value="0">-- Selecciona --</option>
      <option *ngFor="let e of estudiantes" [value]="e.idProducto">
        {{ e.nombre }} - DNI: {{ e.descripcion }}
      </option>
    </select>
  </div>

  <div style="margin-bottom:8px;">
    <label>Carrera *</label><br>
    <select [(ngModel)]="form.careerId" style="width:100%;">
      <option value="0">-- Selecciona --</option>
      <option *ngFor="let c of carreras" [value]="c.idCareer">
        {{ c.career }} - S/. {{ c.investment }}
      </option>
    </select>
  </div>

  <div style="margin-bottom:8px;">
    <label>Sede *</label><br>
    <input type="text" [(ngModel)]="form.venueName" style="width:100%;" />
  </div>

  <div style="margin-bottom:8px;">
    <label>Promotor</label><br>
    <input type="text" [(ngModel)]="form.promoter" style="width:100%;" />
  </div>

  <div style="margin-bottom:8px;">
    <label>Monto S/.</label><br>
    <input type="number" [(ngModel)]="form.price" style="width:100%;" />
  </div>

  <div style="display:flex; gap:8px; margin-top:12px;">
    <button (click)="registrarMatricula()" [disabled]="guardando">
      {{ guardando ? 'Guardando...' : 'Registrar' }}
    </button>
    <button (click)="cancelar()">Cancelar</button>
  </div>
</div>

<!-- Tabla de matrículas -->
<table border="1" cellpadding="6" cellspacing="0" style="width:100%; border-collapse:collapse;">
  <thead style="background:#eee;">
    <tr>
      <th>ID</th>
      <th>Estudiante</th>
      <th>Carrera</th>
      <th>Sede</th>
      <th>Promotor</th>
      <th>Monto</th>
      <th>Estado</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let m of matriculas">
      <td>{{ m.idVenta }}</td>
      <td>{{ m.estudiante?.nombre }}</td>
      <td>{{ m.carrera?.career }}</td>
      <td>{{ m.venueName }}</td>
      <td>{{ m.promoter }}</td>
      <td>S/. {{ m.total }}</td>
      <td>{{ m.estado ? 'Activo' : 'Inactivo' }}</td>
    </tr>
    <tr *ngIf="matriculas.length === 0 && !loadingVentas">
      <td colspan="7" style="text-align:center;">No hay matrículas</td>
    </tr>
  </tbody>
</table>
